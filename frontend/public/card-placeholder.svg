<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 245 342" fill="none">
  <!-- Card background -->
  <rect width="245" height="342" rx="12" fill="#1e293b"/>
  <rect x="2" y="2" width="241" height="338" rx="11" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <!-- Decorative border pattern -->
  <rect x="10" y="10" width="225" height="322" rx="8" stroke="#1e3a5f" stroke-width="1.5" fill="none"/>
  <rect x="14" y="14" width="217" height="314" rx="6" stroke="#1e3a5f" stroke-width="0.75" fill="none"/>

  <!-- Pokeball design center -->
  <circle cx="122" cy="160" r="55" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
  <circle cx="122" cy="160" r="50" fill="#0f172a"/>

  <!-- Top half of pokeball -->
  <path d="M72 160 A50 50 0 0 1 172 160" fill="#1e3a5f"/>

  <!-- Bottom half of pokeball -->
  <path d="M72 160 A50 50 0 0 0 172 160" fill="#0f172a"/>

  <!-- Dividing line -->
  <line x1="72" y1="160" x2="172" y2="160" stroke="#334155" stroke-width="3"/>

  <!-- Center button -->
  <circle cx="122" cy="160" r="14" fill="#0f172a" stroke="#334155" stroke-width="3"/>
  <circle cx="122" cy="160" r="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>

  <!-- Shine effect on pokeball -->
  <path d="M90 130 Q105 118 125 122" stroke="#2d4a6e" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- "Image Unavailable" text -->
  <text x="122" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="0.5">Image Unavailable</text>

  <!-- Corner decorations -->
  <circle cx="28" cy="28" r="4" fill="#1e3a5f"/>
  <circle cx="217" cy="28" r="4" fill="#1e3a5f"/>
  <circle cx="28" cy="314" r="4" fill="#1e3a5f"/>
  <circle cx="217" cy="314" r="4" fill="#1e3a5f"/>

  <!-- Top decorative line -->
  <line x1="40" y1="28" x2="205" y2="28" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="40" y1="314" x2="205" y2="314" stroke="#1e3a5f" stroke-width="1"/>
</svg>
